<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Tower - Alien Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🟢 GREEN TOWER</h1>
            <div class="stars" id="stars">⭐</div>
            <div class="difficulty-selector">
                <label for="difficulty-select">DIFFICULTY:</label>
                <select id="difficulty-select" onchange="game.setDifficulty(this.value)">
                    <option value="easy">Cadet</option>
                    <option value="medium" selected>Commander</option>
                    <option value="hard">Overlord</option>
                </select>
            </div>
        </header>

        <section class="stats">
            <div class="stat-card">
                <h3>CRYPTO FUNDS</h3>
                <div class="value" id="funds">$0</div>
            </div>
            <div class="stat-card">
                <h3>CITIZEN HAPPINESS</h3>
                <div class="value" id="happiness">100%</div>
            </div>
            <div class="stat-card">
                <h3>WASTE LEVEL</h3>
                <div class="value" id="waste">0 units</div>
            </div>
            <div class="stat-card">
                <h3>ELEVATOR STATUS</h3>
                <div class="value" id="elevator-status">None installed</div>
            </div>
        </section>

        <main class="main-grid">
            <aside class="panel">
                <div class="tabs">
                    <button class="tab-btn active" onclick="showTab('build')">BUILD</button>
                    <button class="tab-btn" onclick="showTab('staff')">STAFF</button>
                    <button class="tab-btn" onclick="showTab('systems')">SYSTEMS</button>
                </div>

                <div id="build-tab" class="tab-content active">
                    <h2>Construction</h2>
                    <div class="build-options" id="build-menu">
                        <!-- Loaded from JSON -->
                    </div>
                </div>

                <div id="staff-tab" class="tab-content">
                    <h2>Human Resource</h2>
                    <div class="build-options" id="staff-menu">
                        <!-- Loaded from JSON -->
                    </div>
                </div>

                <div id="systems-tab" class="tab-content">
                    <h2>Defense Systems</h2>
                    <div class="build-options" id="systems-menu">
                        <!-- Loaded from JSON -->
                    </div>
                </div>
            </aside>

            <section id="tower-map">
                <div class="protection-rings" id="rings">
                    <!-- Dynamic rings for coverage -->
                </div>
                <div class="tower-stack" id="tower-stack">
                    <!-- Floors rendered here -->
                </div>
            </section>
        </main>

        <footer class="controls">
            <button class="action-btn" onclick="game.morningCycle()">START MORNING CYCLE</button>
            <button class="action-btn" onclick="game.exportSave()">EXPORT SAVE</button>
            <button class="action-btn" onclick="document.getElementById('import-input').click()">IMPORT SAVE</button>
            <input type="file" id="import-input" accept=".json" style="display:none" onchange="
                const file = this.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => game.importSave(e.target.result);
                reader.readAsText(file);
                this.value = '';
            ">
            <button class="action-btn" onclick="if(confirm('Reset game? All progress will be lost.')) game.resetGame()">RESET GAME</button>
            <div class="log-panel" id="log-panel">
                <h3>SYSTEM LOG</h3>
                <div id="log-content"></div>
            </div>
        </footer>
    </div>

    <div id="threat-indicator" class="threat-indicator" style="display:none;">
        ⚠️ DISASTER IN PROGRESS ⚠️
    </div>

    <script src="script.js"></script>
    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-tab').classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
